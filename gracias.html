<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias | Digital.Hec[It]</title>
    <meta name="description" content="Hemos recibido tu mensaje. Te responderemos en menos de 24 horas.">
    <meta name="robots" content="noindex, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Gracias | Digital.Hec[It]">
    <meta property="og:description" content="Mensaje recibido. Te respondemos pronto.">
    <meta property="og:image" content="https://digitalhecit.com/Asset/favicon.svg">

    <!-- Fuentes -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="Asset/favicon.svg?v=4">
    <link rel="icon" type="image/png" sizes="48x48" href="Asset/favicon.png?v=1">

    <style>
        :root {
            --bg: #0f172A;
            --accent: #0EA5E9;
            --violet: #7C3AED;
            --text: #F1F5F9;
            --muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Loader */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loader-logo .brand-logo {
            transform: scale(1.4);
            margin-bottom: 30px;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .loader-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--violet));
            animation: loading 1.5s ease-in-out infinite;
            transform-origin: left;
        }

        @keyframes loading {
            0% {
                transform: scaleX(0);
            }

            50% {
                transform: scaleX(1);
            }

            100% {
                transform: scaleX(0);
                transform-origin: right;
            }
        }

        /* Logo (igual al del sitio) */
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .brand-icon {
            position: relative;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: #fff;
        }

        .brand-icon::before,
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
        }

        .brand-icon::after {
            transform: translate(3px, 3px);
            border-color: var(--accent);
            opacity: 0.6;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-digital {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-hecit {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .brand-hecit span {
            color: var(--accent);
            font-weight: 600;
        }

        /* Contenido principal */
        .gracias-container {
            text-align: center;
            padding: 40px 24px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .gracias-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .check-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, var(--accent), var(--violet));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .check-icon svg {
            width: 36px;
            height: 36px;
            stroke: white;
            stroke-width: 3;
        }

        .gracias-titulo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }

        .gracias-sub {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .gracias-botones {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primario {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #0F172A;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
        }

        .btn-primario:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.5);
        }

        .btn-secundario {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(14, 165, 233, 0.2);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-secundario:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-logo">
            <div class="brand-logo">
                <div class="brand-icon">DH</div>
                <div class="brand-text">
                    <div class="brand-digital">DIGITAL</div>
                    <div class="brand-hecit">H E C <span>[ I T ]</span></div>
                </div>
            </div>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <!-- Contenido -->
    <div class="gracias-container" id="graciasContainer">
        <div class="check-icon">
            <svg viewBox="0 0 24 24" fill="none">
                <polyline points="4 12 10 18 20 6"></polyline>
            </svg>
        </div>
        <h1 class="gracias-titulo">¡Gracias por contactarnos!</h1>
        <p class="gracias-sub" id="graciasMensaje">
            Hemos recibido tu mensaje. Te responderemos en menos de 24 horas.
        </p>
        <div class="gracias-botones">
            <a href="https://wa.me/573161621202?text=%C2%A1Hola%2C%20Digital.Hec%5BIt%5D%21%20Acabo%20de%20enviar%20un%20mensaje%20desde%20su%20web%20y%20quisiera%20agilizar%20la%20consulta."
                class="btn-primario" target="_blank" rel="noopener noreferrer">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                </svg>
                Hablar por WhatsApp
            </a>
            <a href="/" class="btn-secundario">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // Loader
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const container = document.getElementById('graciasContainer');
            const tiempoMinimo = 800;
            const inicio = performance.now();

            function mostrarContenido() {
                const transcurrido = performance.now() - inicio;
                const retraso = Math.max(0, tiempoMinimo - transcurrido);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.addEventListener('transitionend', () => {
                        loader.style.display = 'none';
                    }, { once: true });
                    setTimeout(() => {
                        container.classList.add('visible');
                    }, 200);
                }, retraso);
            }

            mostrarContenido();

            // Personalizar mensaje según de dónde vino
            const params = new URLSearchParams(window.location.search);
            const origen = params.get('origen');
            const mensaje = document.getElementById('graciasMensaje');
            if (origen === 'soporte') {
                mensaje.textContent = 'Hemos recibido tu solicitud de soporte técnico. Te responderemos en menos de 24 horas con un diagnóstico.';
            } else if (origen === 'web') {
                mensaje.textContent = 'Hemos recibido tu proyecto. Te responderemos en menos de 24 horas con una propuesta personalizada.';
            }
        });
    </script>
</body>

</html>
